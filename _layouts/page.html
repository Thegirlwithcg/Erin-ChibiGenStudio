---
layout: default
---
<div class="page-content">
  <div class="container">
    {% if page.title %}
    <header class="page-header">
      <h1>{{ page.title }}</h1>
      {% if page.subtitle %}
      <p class="page-subtitle">{{ page.subtitle }}</p>
      {% endif %}
    </header>
    {% endif %}
    {{ content }}
  </div>
</div>
